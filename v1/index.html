<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Darts Animation v1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #canvas-container { flex: 1; position: relative; }
    #ui { padding: 12px 20px; background: #111; border-top: 1px solid #333; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=range] { width: 180px; accent-color: #4af; }
    .btn-grid { display: flex; flex-wrap: wrap; gap: 4px; max-width: 320px; }
    .seg-btn {
      width: 28px; height: 28px; border: 1px solid #444; background: #222;
      color: #ccc; font-size: 10px; cursor: pointer; border-radius: 3px;
      transition: background 0.15s;
    }
    .seg-btn:hover { background: #333; }
    .seg-btn.selected { border-color: #4af; color: #4af; }
    .seg-btn.dropped { background: #2a1a1a; border-color: #633; color: #744; }
    .bull-btn { width: 36px; font-size: 9px; }
    .bull-btn.selected { border-color: #fa4; color: #fa4; }
    .actions { display: flex; flex-direction: column; gap: 6px; justify-content: flex-end; }
    .action-btn {
      padding: 6px 14px; border: 1px solid #555; background: #333; color: #eee;
      font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 3px;
    }
    .action-btn:hover { background: #444; }
    .action-btn.reset { background: #1a2a1a; border-color: #363; color: #8c8; }
    .action-btn.reset:hover { background: #233; }
    #info { font-size: 11px; color: #666; align-self: center; }
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">
  <div class="control-group">
    <label>Drop (selected)</label>
    <input type="range" id="wedge-slider" min="0" max="100" value="0" />
  </div>
  <div class="control-group">
    <label>Camera angle</label>
    <input type="range" id="cam-slider" min="10" max="80" value="45" />
  </div>
  <div class="control-group">
    <label>Wedges</label>
    <div class="btn-grid" id="wedge-grid"></div>
  </div>
  <div class="control-group">
    <label>Bulls</label>
    <div class="btn-grid" id="bull-grid"></div>
  </div>
  <div class="actions">
    <button class="action-btn" id="drop-all-btn">Drop All</button>
    <button class="action-btn reset" id="reset-btn">Reset</button>
  </div>
  <div id="info">Click a segment to select, then drag the slider</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Constants ─────────────────────────────────────────────────────────────────
const NUMBERS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

const R_BULL       = 0.18;
const R_OUTER_BULL = 0.36;
const R_WEDGE_IN   = 0.40;
const R_TRIPLE_IN  = 1.05;
const R_TRIPLE_OUT = 1.22;
const R_DOUBLE_IN  = 1.65;
const R_DOUBLE_OUT = 1.85;
const R_BOARD      = 1.90;

// Slab thickness = drop distance so fully dropped top face is flush with socket floor
const WEDGE_DEPTH  = 0.22;
const DROP_DIST    = WEDGE_DEPTH;

const SEG = 64;

const C_STONE_LIGHT = 0x8a8070;
const C_STONE_DARK  = 0x5a5248;
const C_TRIPLE      = 0x1a7a3a;
const C_DOUBLE      = 0x8a1a1a;
const C_BULL_INNER  = 0x8a1a1a;
const C_BULL_OUTER  = 0x1a7a3a;
const C_WIRE        = 0x333333;

// ── Scene ─────────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = container.clientWidth, H = container.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 8, 18);

const camera = new THREE.PerspectiveCamera(45, W / H, 0.01, 50);
camera.position.set(0, 3.5, 3.5);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.05;
controls.maxPolarAngle = Math.PI / 2.05;

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
dirLight.position.set(2, 5, 3);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8090ff, 0.3);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// ── Geometry helpers ──────────────────────────────────────────────────────────
const mat = (color) => new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05 });

// Ring sector (pie-slice annulus) extruded along Y.
// Resting state: slab centered at y=0 → top at +depth/2, bottom at -depth/2.
// When group drops by DROP_DIST=WEDGE_DEPTH: top = depth/2 - WEDGE_DEPTH = -WEDGE_DEPTH/2 = socket floor.
function makeSector(rInner, rOuter, thetaStart, thetaLen, depth) {
  const shape = new THREE.Shape();
  const slices = Math.max(3, Math.round(SEG * thetaLen / (Math.PI * 2)));
  for (let i = 0; i <= slices; i++) {
    const a = thetaStart + (thetaLen * i) / slices;
    i === 0
      ? shape.moveTo(Math.cos(a) * rOuter, Math.sin(a) * rOuter)
      : shape.lineTo(Math.cos(a) * rOuter, Math.sin(a) * rOuter);
  }
  for (let i = slices; i >= 0; i--) {
    const a = thetaStart + (thetaLen * i) / slices;
    shape.lineTo(Math.cos(a) * rInner, Math.sin(a) * rInner);
  }
  shape.closePath();
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, depth / 2, 0);
  return geo;
}

// Full-circle ring (annulus) — for outer bull
function makeRing(rInner, rOuter, depth) {
  const shape = new THREE.Shape();
  shape.absarc(0, 0, rOuter, 0, Math.PI * 2, false);
  const hole = new THREE.Path();
  hole.absarc(0, 0, rInner, 0, Math.PI * 2, true);
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, depth / 2, 0);
  return geo;
}

// Solid disc — for inner bull
function makeDisc(r, depth) {
  const shape = new THREE.Shape();
  shape.absarc(0, 0, r, 0, Math.PI * 2, false);
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, depth / 2, 0);
  return geo;
}

// ── Board ─────────────────────────────────────────────────────────────────────
const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Socket: flat base whose top face sits at y = -WEDGE_DEPTH/2 (= flush with dropped segment top)
const SOCKET_H = WEDGE_DEPTH * 2;
const socketGeo = new THREE.CylinderGeometry(R_BOARD + 0.08, R_BOARD + 0.08, SOCKET_H, 64);
const socketMesh = new THREE.Mesh(socketGeo, mat(0x252018));
socketMesh.position.y = -(WEDGE_DEPTH / 2 + SOCKET_H / 2);
socketMesh.receiveShadow = true;
boardGroup.add(socketMesh);

// Rim ring sitting at board level to frame the socket opening
const rimGeo = makeRing(R_BOARD, R_BOARD + 0.08, WEDGE_DEPTH * 0.5);
const rimMesh = new THREE.Mesh(rimGeo, mat(0x3a3028));
rimMesh.position.y = -WEDGE_DEPTH / 2;
boardGroup.add(rimMesh);

// ── Droppable groups keyed by segment id ──────────────────────────────────────
// Wedges: 1-20, Outer bull: 25, Inner bull: 50
const segments = {}; // id -> THREE.Group

// Wedges
NUMBERS.forEach((num, i) => {
  const tLen = Math.PI * 2 / 20;
  const tStart = (Math.PI / 2) - (i * tLen) - tLen / 2;

  const group = new THREE.Group();

  const mainGeo = makeSector(R_WEDGE_IN, R_DOUBLE_IN, tStart, tLen, WEDGE_DEPTH);
  const mainMesh = new THREE.Mesh(mainGeo, mat(i % 2 === 0 ? C_STONE_LIGHT : C_STONE_DARK));
  mainMesh.castShadow = true;
  mainMesh.receiveShadow = true;
  group.add(mainMesh);

  const triGeo = makeSector(R_TRIPLE_IN, R_TRIPLE_OUT, tStart, tLen, WEDGE_DEPTH);
  group.add(new THREE.Mesh(triGeo, mat(i % 2 === 0 ? C_TRIPLE : C_DOUBLE)));

  const dblGeo = makeSector(R_DOUBLE_IN, R_DOUBLE_OUT, tStart, tLen, WEDGE_DEPTH);
  group.add(new THREE.Mesh(dblGeo, mat(i % 2 === 0 ? C_DOUBLE : C_TRIPLE)));

  boardGroup.add(group);
  segments[num] = group;
});

// Outer bull (25) — ring, drops independently
const bullOuterGroup = new THREE.Group();
bullOuterGroup.add(new THREE.Mesh(makeRing(R_OUTER_BULL, R_WEDGE_IN, WEDGE_DEPTH), mat(C_BULL_OUTER)));
// small gap fill between outer bull and wedge inner edge
boardGroup.add(bullOuterGroup);
segments[25] = bullOuterGroup;

// Inner bull (50) — disc, drops independently
const bullInnerGroup = new THREE.Group();
bullInnerGroup.add(new THREE.Mesh(makeDisc(R_BULL, WEDGE_DEPTH), mat(C_BULL_INNER)));
boardGroup.add(bullInnerGroup);
segments[50] = bullInnerGroup;

// Outer bull ring surround (the green bit between R_OUTER_BULL and R_WEDGE_IN is part of segments[25])
// Add the 25-ring portion that wedges don't cover
const bull25RingGeo = makeRing(R_BULL, R_OUTER_BULL, WEDGE_DEPTH);
bullOuterGroup.add(new THREE.Mesh(bull25RingGeo, mat(C_BULL_OUTER)));

// Wire dividers
NUMBERS.forEach((_, i) => {
  const a = (Math.PI / 2) - i * (Math.PI * 2 / 20);
  const pts = [
    new THREE.Vector3(Math.cos(a) * R_OUTER_BULL, WEDGE_DEPTH / 2 + 0.005, -Math.sin(a) * R_OUTER_BULL),
    new THREE.Vector3(Math.cos(a) * R_DOUBLE_OUT,  WEDGE_DEPTH / 2 + 0.005, -Math.sin(a) * R_DOUBLE_OUT),
  ];
  boardGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: C_WIRE })
  ));
});

// ── State ─────────────────────────────────────────────────────────────────────
const ALL_IDS = [...NUMBERS, 25, 50];
const dropTarget = {};   // 0..1 target
const dropCurrent = {};  // smooth current value
ALL_IDS.forEach(id => { dropTarget[id] = 0; dropCurrent[id] = 0; });

// ── UI ────────────────────────────────────────────────────────────────────────
let selectedId = 20;
const buttons = {};

function makeBtn(id, label, gridId, extraClass = '') {
  const btn = document.createElement('button');
  btn.className = `seg-btn ${extraClass}`;
  btn.textContent = label;
  btn.addEventListener('click', () => selectSegment(id));
  document.getElementById(gridId).appendChild(btn);
  buttons[id] = btn;
}

NUMBERS.forEach(n => makeBtn(n, n, 'wedge-grid'));
makeBtn(25, '25', 'bull-grid', 'bull-btn');
makeBtn(50, 'BS', 'bull-grid', 'bull-btn');

function selectSegment(id) {
  selectedId = id;
  Object.values(buttons).forEach(b => b.classList.remove('selected'));
  buttons[id].classList.add('selected');
  document.getElementById('wedge-slider').value = Math.round(dropTarget[id] * 100);
  const label = id === 25 ? 'Outer Bull (25)' : id === 50 ? 'Bullseye (50)' : `Wedge ${id}`;
  document.getElementById('info').textContent = `${label} selected`;
}

selectSegment(20);

document.getElementById('wedge-slider').addEventListener('input', e => {
  const v = parseInt(e.target.value) / 100;
  dropTarget[selectedId] = v;
  buttons[selectedId].classList.toggle('dropped', v > 0.5);
});

document.getElementById('drop-all-btn').addEventListener('click', () => {
  ALL_IDS.forEach(id => { dropTarget[id] = 1; buttons[id].classList.add('dropped'); });
  document.getElementById('wedge-slider').value = 100;
});

document.getElementById('reset-btn').addEventListener('click', () => {
  ALL_IDS.forEach(id => { dropTarget[id] = 0; buttons[id].classList.remove('dropped'); });
  document.getElementById('wedge-slider').value = 0;
});

document.getElementById('cam-slider').addEventListener('input', e => {
  const rad = THREE.MathUtils.degToRad(parseInt(e.target.value));
  const dist = 5;
  camera.position.set(0, Math.sin(rad) * dist, Math.cos(rad) * dist);
  camera.lookAt(0, 0, 0);
});

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const k = Math.min(1, dt * 8);

  ALL_IDS.forEach(id => {
    const target = -dropTarget[id] * DROP_DIST;
    dropCurrent[id] += (target - dropCurrent[id]) * k;
    segments[id].position.y = dropCurrent[id];
  });

  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
